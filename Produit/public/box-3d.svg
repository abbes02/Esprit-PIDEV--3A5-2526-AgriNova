<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c5d89a"/>
      <stop offset="100%" stop-color="#94b96c"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6f8f4a"/>
      <stop offset="100%" stop-color="#4f6a35"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#879e62"/>
      <stop offset="100%" stop-color="#5c7a40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0b140e" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- base -->
    <polygon points="200,170 360,230 520,170 360,110" fill="url(#top)"/>
    <polygon points="200,170 200,310 360,370 360,230" fill="url(#left)"/>
    <polygon points="520,170 520,310 360,370 360,230" fill="url(#right)"/>
    <!-- open flaps -->
    <polygon points="200,170 120,110 280,70 360,110" fill="#b6d18a"/>
    <polygon points="520,170 360,110 440,70 600,110" fill="#a4c277"/>
    <polygon points="200,170 360,230 280,300 120,240" fill="#7b9856"/>
    <polygon points="520,170 600,240 440,300 360,230" fill="#8aa665"/>
  </g>
</svg>
